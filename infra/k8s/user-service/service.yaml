apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: default
spec:
  # Select pods with label app=user-service
  selector:
    app: user-service

  ports:
    - protocol: TCP
      port: 8001        # Port other services use to call us
      targetPort: 8001  # Port our container listens on

  # ClusterIP: only accessible inside cluster (internal services)
  # NodePort: accessible from outside cluster (for testing)
  # LoadBalancer: cloud load balancer (production)
  type: ClusterIP