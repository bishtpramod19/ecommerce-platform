name: User Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/user-service/**'  # Only run when user-service changes
  pull_request:
    branches: [main]
    paths:
      - 'services/user-service/**'
      
  workflow_dispatch:
env:
  SERVICE_NAME: user-service
  DOCKER_IMAGE: bishtps3/user-service

permissions:
  contents: write  # Required for pushing changes to the repo

jobs:
  # ─── JOB 1: TEST ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/user-service/go.sum

      - name: Run tests
        working-directory: services/user-service
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: users_db
        run: go test ./...

  # ─── JOB 2: BUILD & PUSH ──────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes

    # Only push image on main branch (not on PRs)
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/user-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: UPDATE MANIFEST ───────────────────────────────
  update-manifest:
    name: Update helm values
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs if build-and-push passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values-dev.yaml
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s|tag:.*|tag: ${NEW_TAG}|g" \
            infra/helm/user-service/values-dev.yaml
          echo "Updated image tag to: ${NEW_TAG}"

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/user-service/values-dev.yaml
          git diff --staged --quiet || git commit -m "ci: update user-service image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push